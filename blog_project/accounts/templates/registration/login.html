{% extends "base.html" %}

{% block title %}Log-In{% endblock %}

{% block content %}

<h1>Log-In</h1>
{% if form.errors %}
    <p>
        Ваши данные некорректны. Попробуйте ещё раз.
    </p>
{% endif %}
<form method='post'>
    {% csrf_token %}
    {{form.as_p}}
    <button type='submit'>Войти</button>
</form>

{% endblock %}
