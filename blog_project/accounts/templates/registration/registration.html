{% extends "base.html" %}

{% block title %}Регистрация{% endblock %}

{% block content %}
    <h2>Регистрация</h2>

    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        {% if form.errors %}
            <p style="color: red;">Пожалуйста, исправьте ошибки в форме.</p>
        {% endif %}

        {{ form.as_p }}

        <button type="submit">Зарегистрироваться</button>
    </form>
{% endblock %}
